<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethel's Customs — Custom Shirts, Signs &amp; Cups</title>
<meta name="description" content="Ethel's Customs — custom shirts, signs, and cups made by hand in North Texas.">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@700;900&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --espresso:#3B2416;
    --cream:#F2E0B8;
    --saddle:#6B4A2E;
    --rust:#9C5A3C;
    --tan:#C9A77C;
    --paper:#F8ECDA;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    min-height:100%;
  }

  body{
    font-family:'Source Sans 3', sans-serif;
    color:var(--espresso);
    background:var(--cream);
    /* subtle paper grain */
    background-image:
      radial-gradient(circle at 20% 30%, rgba(107,74,46,0.045) 0, transparent 45%),
      radial-gradient(circle at 80% 70%, rgba(107,74,46,0.045) 0, transparent 50%),
      repeating-linear-gradient(0deg, rgba(59,36,22,0.012) 0px, rgba(59,36,22,0.012) 1px, transparent 1px, transparent 3px);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    line-height:1.5;
  }

  .tag{
    position:relative;
    width:100%;
    max-width:480px;
    background:var(--paper);
    border:1px solid rgba(59,36,22,0.12);
    border-radius:6px;
    padding:56px 40px 48px;
    text-align:center;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.6) inset,
      0 24px 48px -24px rgba(59,36,22,0.35),
      0 2px 4px rgba(59,36,22,0.06);
  }

  /* punch-holes along the top, like a swing tag */
  .notches{
    position:absolute;
    top:14px;
    left:0;
    right:0;
    display:flex;
    justify-content:center;
    gap:30px;
    pointer-events:none;
  }
  .notches span{
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--cream);
    box-shadow: inset 0 1px 3px rgba(59,36,22,0.25);
  }

  .logo{
    width:min(58%, 240px);
    margin:8px auto 18px;
    display:block;
  }

  h1{
    font-family:'Bitter', serif;
    font-weight:900;
    font-size:clamp(1.6rem, 6vw, 2.1rem);
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--espresso);
    margin-bottom:6px;
  }

  .tagline{
    font-style:italic;
    font-size:0.95rem;
    color:var(--rust);
    margin-bottom:22px;
  }

  .divider{
    width:64px;
    height:2px;
    background:var(--tan);
    margin:0 auto 22px;
    border-radius:2px;
  }

  .blurb{
    font-size:0.98rem;
    color:var(--saddle);
    max-width:360px;
    margin:0 auto 28px;
  }

  .contact{
    font-family:'Bitter', serif;
    font-weight:700;
    font-size:0.92rem;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--espresso);
    margin-bottom:6px;
  }

  .location{
    font-size:0.9rem;
    color:var(--saddle);
    margin-bottom:28px;
  }

  .socials{
    display:flex;
    justify-content:center;
    gap:16px;
    flex-wrap:wrap;
  }

  .socials a{
    font-family:'Bitter', serif;
    font-weight:700;
    font-size:0.85rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--espresso);
    text-decoration:none;
    padding:10px 20px;
    border:2px solid var(--espresso);
    border-radius:3px;
    transition: background-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
  }

  .socials a:hover,
  .socials a:focus-visible{
    background:var(--espresso);
    color:var(--cream);
    transform:translateY(-1px);
  }

  .socials a:focus-visible{
    outline:3px solid var(--rust);
    outline-offset:2px;
  }

  footer{
    margin-top:34px;
    font-size:0.78rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--tan);
  }

  @media (prefers-reduced-motion: reduce){
    .socials a{ transition:none; }
  }

  @media (max-width:380px){
    .tag{ padding:48px 24px 36px; }
    .socials a{ padding:9px 16px; }
  }
</style>
</head>
<body>

  <main class="tag">
    <div class="notches" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <img class="logo" src="logo.png" alt="Ethel's Customs — EC monogram badge logo">

    <h1>Ethel's Customs</h1>
    <p class="tagline">Custom shirts &middot; signs &middot; cups</p>

    <div class="divider"></div>

    <p class="blurb">
      Hand-finished custom goods, made one order at a time in North Texas.
      Branded with care, built to last.
    </p>

    <p class="contact"><a href="mailto:ethel@ethelscustoms.com" style="color:inherit; text-decoration:none;">ethel@ethelscustoms.com</a></p>
    <p class="location">North Texas &middot; Collin, Hunt &amp; Rains County areas</p>

    <nav class="socials" aria-label="Social media links">
      <a href="https://www.instagram.com/ethels_customs" target="_blank" rel="noopener">Instagram</a>
      <a href="https://www.facebook.com/ethelscustoms" target="_blank" rel="noopener">Facebook</a>
      <a href="https://www.tiktok.com/@ethelscustoms" target="_blank" rel="noopener">TikTok</a>
    </nav>

    <footer>Made by hand &middot; Ethel's Customs</footer>
  </main>

</body>
</html>
